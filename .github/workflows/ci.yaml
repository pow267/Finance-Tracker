name: CI - Build & Kiểm thử

on:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # ===== Lấy mã nguồn =====
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      # ===== Cài đặt Docker Buildx =====
      - name: Cài đặt Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ===== Build image Docker =====
      - name: Build image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: false
          tags: finance_app:test
          load: true

      # ===== Khởi động MongoDB =====
      - name: Khởi động MongoDB
        run: |
          docker run -d --name mongo_test -p 27017:27017 mongo:6

      # ===== Khởi động ứng dụng =====
      - name: Khởi động ứng dụng kiểm thử
        run: |
          docker run -d \
            --name app_test \
            --link mongo_test:mongo \
            -e MONGO_URL=mongodb://mongo:27017/finance_demo \
            -p 3000:3000 \
            finance_app:test

      # ===== Chờ ứng dụng sẵn sàng =====
      - name: Kiểm tra ứng dụng đã sẵn sàng
        run: |
          for i in {1..20}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000 || true)
            if [ "$STATUS" = "200" ]; then
              echo "Ứng dụng đã sẵn sàng"
              exit 0
            fi
            echo "Đang chờ ứng dụng... lần $i"
            sleep 3
          done

          echo "Ứng dụng không khởi động được"
          docker logs app_test
          exit 1

      # ===== Dọn dẹp =====
      - name: Dọn dẹp container kiểm thử
        if: always()
        run: |
          docker rm -f app_test || true
          docker rm -f mongo_test || true