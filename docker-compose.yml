services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: finance_app
    environment:
      - MONGO_URL=mongodb://mongo:27017/finance_demo
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: finance_mongo
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: